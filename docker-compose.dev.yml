# ============================================================================
# FILE: docker-compose.dev.yml
# PURPOSE: Development overrides — exposes debug ports, enables hot-reload,
#          and relaxes resource constraints for local development.
#          Merges with docker-compose.yml using:
#          docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ARCHITECTURE REF: §8.3 — Development Environment Setup
# ============================================================================

services:

  # Expose PostgreSQL on localhost for direct DB inspection with pgAdmin/DBeaver
  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  # Expose Redis on localhost for direct cache inspection with redis-cli / RedisInsight
  redis:
    ports:
      - "127.0.0.1:6379:6379"

  # Expose Qdrant UI on localhost for collection browsing
  qdrant:
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"   # gRPC

  # Expose MinIO API on localhost for mc CLI / S3 browser
  minio:
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  # Expose auth-svc directly for testing login without nginx
  auth-svc:
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      LOG_LEVEL: DEBUG
      LOG_FORMAT: text   # Human-readable logs in dev
    # Hot-reload: mount source code instead of copying it into image
    volumes:
      - ./services/auth/app:/app/app:ro
      - ./shared:/app/shared:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # Expose query-svc directly for testing RAG pipeline without nginx
  query-svc:
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      LOG_LEVEL: DEBUG
      LOG_FORMAT: text
    volumes:
      - ./services/query/app:/app/app:ro
      - ./shared:/app/shared:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload

  # Expose ingest-svc directly for testing uploads without nginx
  ingest-svc:
    ports:
      - "127.0.0.1:8003:8003"
    environment:
      LOG_LEVEL: DEBUG
      LOG_FORMAT: text
    volumes:
      - ./services/ingest/app:/app/app:ro
      - ./shared:/app/shared:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload

  # Expose embedding service for direct testing
  embedding-svc:
    ports:
      - "127.0.0.1:8004:8004"
    environment:
      LOG_LEVEL: DEBUG

  # Expose reranker service for direct testing
  reranker-svc:
    ports:
      - "127.0.0.1:8005:8005"
    environment:
      LOG_LEVEL: DEBUG

  # Expose LLM server directly for Swagger/curl testing
  llm-server:
    ports:
      - "127.0.0.1:8080:8080"

  # Expose Prometheus on localhost for direct metric queries
  prometheus:
    ports:
      - "127.0.0.1:9090:9090"

  # Grafana already exposed in base compose on 127.0.0.1:3000
