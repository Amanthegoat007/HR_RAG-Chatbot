<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Knowledge Chatbot</title>
    <meta name="description" content="HR Knowledge Chatbot — Ask questions about company policies and get instant answers.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <!-- ============ LOGIN SCREEN ============ -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="login-logo">
                <div class="logo-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="10" r="1"/>
                        <circle cx="8" cy="10" r="1"/>
                        <circle cx="16" cy="10" r="1"/>
                    </svg>
                </div>
                <h1>HR Knowledge Chatbot</h1>
                <p class="login-subtitle">Sign in to access HR policies and documents</p>
            </div>

            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="hr_admin" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" id="login-btn" class="btn-primary">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader" hidden></span>
                </button>
                <div id="login-error" class="error-msg" hidden></div>
            </form>
        </div>
    </div>

    <!-- ============ CHAT SCREEN ============ -->
    <div id="chat-screen" class="screen">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">
                <div class="header-logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                </div>
                <div>
                    <h2>HR Knowledge Chatbot</h2>
                    <span class="header-status" id="connection-status">Connected</span>
                </div>
            </div>
            <div class="header-right">
                <span class="user-badge" id="user-badge">Admin</span>
                <button id="logout-btn" class="btn-icon" title="Sign out">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Messages Area -->
        <main class="chat-messages" id="chat-messages">
            <div class="welcome-message">
                <div class="welcome-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="10" r="1"/>
                        <circle cx="8" cy="10" r="1"/>
                        <circle cx="16" cy="10" r="1"/>
                    </svg>
                </div>
                <h3>Welcome! How can I help you today?</h3>
                <p>Ask me anything about company HR policies, leave entitlements, benefits, and more.</p>
                <div class="example-questions">
                    <button class="example-q" data-q="What is the annual leave policy?">🏖️ Annual leave policy</button>
                    <button class="example-q" data-q="What are the working hours?">⏰ Working hours</button>
                    <button class="example-q" data-q="How do I apply for sick leave?">🏥 Sick leave process</button>
                    <button class="example-q" data-q="What benefits does the company offer?">💼 Employee benefits</button>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="chat-input-area">
            <form id="chat-form">
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="Ask a question about HR policies..." rows="1" maxlength="2000" required></textarea>
                    <button type="submit" id="send-btn" class="btn-send" disabled title="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </form>
            <p class="input-hint">Press Enter to send, Shift+Enter for new line</p>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
