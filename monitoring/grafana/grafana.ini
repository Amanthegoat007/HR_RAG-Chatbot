# ============================================================================
# FILE: monitoring/grafana/grafana.ini
# PURPOSE: Grafana server configuration for the HR RAG Chatbot monitoring.
# ARCHITECTURE REF: §10 — Monitoring & Observability
# ============================================================================
#
# This configuration enables:
# - Anonymous read-only access (for dev / internal teams without login)
# - Auto-provisioning of Prometheus datasource and pre-built dashboards
# - Secure admin password via environment variable (GF_SECURITY_ADMIN_PASSWORD)
#
# Production note: Set GF_SECURITY_ALLOW_EMBEDDING=false and configure
# proper OAuth (GF_AUTH_GOOGLE or GF_AUTH_LDAP) for production deployments.

[server]
# Grafana HTTP server
http_addr = 0.0.0.0
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[database]
# Grafana uses SQLite by default — fine for single-node deployment
type = sqlite3
path = grafana.db

[security]
# Admin credentials — override with GF_SECURITY_ADMIN_PASSWORD env var
admin_user = admin
# IMPORTANT: Change this! Set GF_SECURITY_ADMIN_PASSWORD in .env
admin_password = ${GF_SECURITY_ADMIN_PASSWORD:changeme}
# Disable Grafana's automatic login with default credentials after first run
disable_initial_admin_creation = false
# Allow embedding Grafana panels in iframes (needed if embedding in the HR portal)
allow_embedding = true

[auth.anonymous]
# Anonymous read-only access — allows monitoring without login in dev/internal
# Set to false in production and use proper authentication
enabled = true
org_name = Main Org.
org_role = Viewer

[users]
# Prevent anonymous users from creating accounts
allow_sign_up = false

[dashboards]
# Default home dashboard
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/hr-chatbot.json

[log]
mode = console
level = info

[analytics]
# Disable usage reporting to Grafana Labs (data privacy)
reporting_enabled = false
check_for_updates = false

[unified_alerting]
# Enable unified alerting (Grafana 8+)
enabled = false

[feature_toggles]
# Enable new features as needed
enable =
