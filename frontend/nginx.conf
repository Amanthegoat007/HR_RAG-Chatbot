# ============================================================================
# FILE: nginx.conf
# PURPOSE: Nginx reverse proxy configuration for the HR RAG Chatbot frontend.
#          Serves the React SPA and proxies API requests to backend monoliths.
# ============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout 75s;
    keepalive_requests 1000;
    server_tokens off;

    # Basic rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_status 429;

    # Allow large files for document ingestion
    client_max_body_size 200M;
    client_body_buffer_size 10M;
    client_body_timeout 300s;

    # Upstreams
    upstream backend_monolith {
        server backend:8000;
        keepalive 10;
    }

    upstream rag_pipeline {
        server rag-pipeline:8002;
    }

    server {
        listen 80;
        server_name _;

        # Health check
        location = /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # STATIC FRONTEND SPA
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # PROXY ALL /api/* requests (Auth, Conversations, Messages, Documents)
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            # The backend monolith handles /api/auth, /api/conversations, /api/messages, /api/documents
            proxy_pass http://backend_monolith/api/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Buffering configuration for normal API requests and SSE
            # Since BFF handles SSE from rag-pipeline and streams it to client,
            # we need to disable buffering here too.
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_set_header Connection '';
            chunked_transfer_encoding off;
            
            # Streaming uploads
            proxy_request_buffering off;
        }
    }
}
