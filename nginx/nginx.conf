# ============================================================================
# FILE: nginx/nginx.conf
# PURPOSE: Nginx reverse proxy configuration — SSL termination, rate limiting,
#          routing to microservices, SSE support for streaming responses.
# ARCHITECTURE REF: §6 — Nginx Configuration
# KEY FEATURES:
#   - TLS 1.2+ termination (self-signed for dev, real cert for prod)
#   - Rate limiting: 10 req/s per IP (Architecture §9)
#   - SSE-specific config for /query (no buffering, long timeout)
#   - File upload limit: 200MB (for document ingestion)
#   - Security headers: HSTS, X-Frame-Options, X-Content-Type-Options
# ============================================================================

# Number of worker processes — auto detects CPU cores
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    use epoll;              # Linux-optimized event model (efficient for many connections)
    multi_accept on;
}

http {
    # ---------------------------------------------------------------------------
    # MIME types and basic settings
    # ---------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimize file sending
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Keep-alive settings — important for SSE long-running connections
    keepalive_timeout 75s;
    keepalive_requests 1000;

    # Hide nginx version from error pages and headers (security hardening)
    server_tokens off;

    # ---------------------------------------------------------------------------
    # LOGGING — structured format for Grafana/Loki ingestion
    # ---------------------------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":"$status",'
            '"body_bytes_sent":"$body_bytes_sent",'
            '"request_time":"$request_time",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_x_request_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ---------------------------------------------------------------------------
    # RATE LIMITING — 10 requests/second per IP (Architecture §9)
    # limit_req_zone: defines the shared memory zone for rate limiting
    #   - key: $binary_remote_addr — client IP (binary format saves memory)
    #   - zone: named 'api_limit', 10MB storage (~160,000 IP addresses)
    #   - rate: 10r/s — allow 10 requests per second per IP
    # ---------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Return 429 Too Many Requests (not nginx default 503) for clearer client errors
    limit_req_status 429;

    # ---------------------------------------------------------------------------
    # FILE UPLOAD SIZE — 200MB for document uploads (Architecture §3.1)
    # ---------------------------------------------------------------------------
    client_max_body_size 200M;

    # Increase buffer sizes for large file uploads
    client_body_buffer_size 10M;
    client_body_timeout 300s;

    # ---------------------------------------------------------------------------
    # UPSTREAM DEFINITIONS — service discovery via Docker DNS
    # Docker Compose sets up internal DNS: service names resolve to container IPs
    # ---------------------------------------------------------------------------
    upstream auth_backend {
        server auth-svc:8001;
        keepalive 10;   # Maintain 10 persistent connections to upstream
    }

    upstream query_backend {
        server query-svc:8002;
        # SSE connections are long-lived — don't use keepalive pool for SSE upstream
        # (handled per-request with Connection: keep-alive header instead)
    }

    upstream ingest_backend {
        server ingest-svc:8003;
        keepalive 5;
    }

    # ---------------------------------------------------------------------------
    # HTTP SERVER — redirect all HTTP to HTTPS
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Health check endpoint — returns 200 without redirect (used by Docker healthcheck)
        location = /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # Redirect all other HTTP requests to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # HTTPS SERVER — main server block
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;           # Enable HTTP/2 for better multiplexing (important for SSE)
        server_name _;

        # -----------------------------------------------------------------------
        # SSL CONFIGURATION — TLS 1.2+ (Architecture §9)
        # -----------------------------------------------------------------------
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # Modern TLS configuration (disable TLS 1.0/1.1)
        ssl_protocols TLSv1.2 TLSv1.3;

        # Strong cipher suites — prefer ECDHE for forward secrecy
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;  # Let client choose (modern clients have good ciphers)

        # SSL session cache — avoids full handshake for repeat connections
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # -----------------------------------------------------------------------
        # SECURITY HEADERS (Architecture §9)
        # -----------------------------------------------------------------------
        # HSTS: Tell browsers to always use HTTPS for this domain
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Prevent clickjacking
        add_header X-Frame-Options DENY always;
        # Prevent MIME-type sniffing
        add_header X-Content-Type-Options nosniff always;
        # Referrer policy — don't leak URL details in cross-origin requests
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Disable browser features not needed (microphone, camera, etc.)
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # -----------------------------------------------------------------------
        # HEALTH CHECK — direct response, no upstream needed
        # -----------------------------------------------------------------------
        location = /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # -----------------------------------------------------------------------
        # AUTH SERVICE — /auth/* → auth-svc:8001
        # Standard REST API: short requests, full buffering OK
        # -----------------------------------------------------------------------
        location /auth/ {
            # Apply rate limiting: burst=20 allows brief spikes, nodelay sends immediate 429
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://auth_backend/auth/;

            # Standard proxy headers — pass client IP to upstream for audit logging
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Pass request ID for distributed tracing
            proxy_set_header X-Request-ID      $request_id;

            # Timeouts for auth (should be fast: < 1 second normally)
            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }

        # -----------------------------------------------------------------------
        # QUERY SERVICE — /query* → query-svc:8002
        # CRITICAL SSE configuration:
        #   - proxy_buffering off: don't buffer SSE events (client needs them immediately)
        #   - proxy_cache off: never cache SSE responses
        #   - proxy_read_timeout 300s: allow long streaming responses (up to 5 min)
        #   - Connection header cleared: prevents proxy from sending Connection: close
        #   - chunked_transfer_encoding off: SSE uses its own framing, not chunked
        # -----------------------------------------------------------------------
        location /query {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://query_backend/query;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;

            # SSE-specific configuration (do NOT buffer streaming responses)
            proxy_buffering             off;
            proxy_cache                 off;
            proxy_read_timeout          300s;

            # These headers are required for SSE to work through a proxy
            proxy_set_header Connection '';
            chunked_transfer_encoding   off;

            # Pass the Authorization header (contains JWT Bearer token)
            proxy_pass_header Authorization;
        }

        # -----------------------------------------------------------------------
        # INGEST SERVICE — /ingest/* → ingest-svc:8003
        # Long timeout for large file uploads (200MB at typical server speeds)
        # -----------------------------------------------------------------------
        location /ingest/ {
            # Lower burst limit for uploads (they're expensive operations)
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass http://ingest_backend/ingest/;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            proxy_pass_header Authorization;

            # Extended timeout for large file uploads
            proxy_connect_timeout  10s;
            proxy_send_timeout     300s;   # 5 minutes for large uploads
            proxy_read_timeout     300s;

            # Disable proxy request buffering — stream the upload directly to upstream
            # This is important for large files (avoids buffering 200MB in nginx)
            proxy_request_buffering off;
        }

        # -----------------------------------------------------------------------
        # STATIC FRONTEND — Chat UI served from /usr/share/nginx/html
        # -----------------------------------------------------------------------
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # -----------------------------------------------------------------------
        # DEFAULT — serve frontend index.html (SPA-style)
        # -----------------------------------------------------------------------
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
